  <script id="4" type="text/markdown">
    The work that ushered me into writing with computation was first characterized by some sense of the significant and affective possibilities that may arise from exposing and exploiting certain relationships between words and their constituent elements. When language is transcribed or otherwise represented graphically, in English, we call these constituent elements ‘letters’ and we take them to be language’s fundamental constituent elements: its *atoms*. This is, of course, a simplification. But it is one that has traction for anyone *literate* and it has been disproportionately reinforced, if not hypostatized by the still predominant Western, now Global, regime of computation.

    Later, my work went on to experiment with translating from one spatial arrangement of letters to another. In the departure arrangement, the letters would be the constituents of one set of words; in the destination arrangement, letters from the same set or literal vocabulary would be moved or replaced to become the constituents of a different set of words. I characterized the processes that moved from one arrangement to another as ‘transliteral.’ The identities of the letters transcended the distinct arrangements and also any transitional arrangements in the shift from one readable state to another.&nbsp;<span data-nb="testnote"></span>
  </script>
  <script id="5" type="text/markdown">
    But I studied Chinese, and the graphic representation of languages in the sinosphere does not make use of graphic linguistic ‘atoms’ that neatly correspond with the Roman letters to which most of the literate world has become accustomed. When working on a major project, _riverIsland_, bringing together Chinese poetics with a personal poetic project that shared these poetics at the level of short lyric descriptions of place, I began to think about processes that would be able to translate from one system of literal transcription to another. From Roman letters to Chinese characters.

    Whereas my transliteral processes worked with on set of ‘atomic’ letters, Roman letters, the processes I came to call ‘interliteral’ had to translate from on set of letters to another, from one atomic ‘table of elements’ to another.

    In transliteral process the letters retain their integrity. They move or they are replaced. They retain the same kinds of relationships to words they constitute at any static point in the process. This is impossible with respect to what I am calling ‘interliteral’ processes. The only commonality, regarding either the letters themselves or the differently constituted ‘words’ that they represent is graphic. Thus an ‘interliteral’ translation is a graphic translation.

    For _riverIsland_ I made an animation – triggered at nodal points within the larger project – with interliteral translations. Here is the animation:

  <script id="10" type="text/markdown">
    The ordering of these keyframes and the repetition of the regular script character was intentional, and intentionally a compromise in that, in principle, a graphic morph from any of the keyframes to any other was possible. The sequence is conceived as a loop so that the morph from Cursive script (last keyframe) to Regular script (first keyframe) should be read into the figures above and it is, in fact, rendered into the animation.

    The no-font glyphs and Square Words keyframes require a little extra commentary.

    In the 1990s, I was already aware that what I now think of as the ‘regime of computation’ had been historically established overdetermined by Anglo-American material cultural formations. With respect to the localization and internationalization of computer systems (though much good work was underway), non-alphabetic scripts were, at the time, basically being ‘patched into’ operating systems that had a modularity (a kind of textual atomic structure) built on Roman fonts sets and, initially, on ASCII. In a critical art gesture, I wanted to point to this structural and ideological bias by visualizing disjunctures of transcription to which non-alphabetic cultures were subjected, unless they adapted to, created, and installed ‘extra resources,’ such as fonts that needed to be handled by nonstandard protocols and special software. I do not think that I did a good enough job of explaining this at the time and it is likely that any potential effects of the gesture were mostly lost.
  </script>

    ---
    #### [ The Text from Programmatology: ]
    The atomic structure of written language and, I would argue, language-as-such differs in the two centers of ‘language and civilization.’ (I lean heavily and happily on Derrida in taking this view.) These differences are translated to digital media because linguistic structure itself — not simply linguistic ‘data’ — is transcribed by the entire historical process of digitization, taken to include the design of computing systems and data structures, not merely the actual transcription of cultural objects into bits and bytes. Basically, our programmatological systems reflect their derivation from an alphabetic system of linguistic inscription. Thus, I can easily use existing programming systems to manipulate western language in ways which correspond to encoded structures which are approximately ‘faithful’ to the language. It is easy to refer to letters as constituent of words, for instance. By contrast, it would be difficult, using existing systems in a straightforward way, to refer to the constituents of Chinese characters. Inevitably, in the first instance, while developing ideas and programs for text manipulation, I have taken advantage of the encoded structures of western language. I remain sharply aware that I am complicit with a privileged symbolic structure in doing so, recognizing that digitization could have been very different, commensurate with characters rather than letters. A recognition of this problematic underlies my most recent finished piece, <cite>riverIsland</cite>, which might otherwise be read as some sort of transcultural pastoral/lyric poetic exercise.
  </script>

  <script id="23" type="text/x-typescript" pinned="">
    const newEditorialSrc = `function nbs(selector = "[data-nb]", heading = "<h3>Notes</h3>") {
      const container = document.createElement("div");
      let headings = [];

      function hashLinkCheck(hashLink) {
        let hashLinkChecks = 0;
        const hashLinkChecker = setInterval((checksLimit = 2) => {
          let div = document.getElementById(
            hashLink.substring(hashLink.indexOf("#") + 1)
          );
          if (div) {
            div.scrollIntoView();
            clearInterval(hashLinkChecker);
          }
          if (++hashLinkChecks >= checksLimit && !div)
            clearInterval(hashLinkChecker);
        }, 100);
      }

      function observed() {
        let nbNum = 0;
        const h = Array.from(document.querySelectorAll(selector));
        if (h.length !== headings.length || h.some((h, i) => headings[i] !== h)) {
          headings = h;
          container.innerHTML = heading;
          const inner = document.createElement("div");
          headings.forEach((h) => {
            h.innerHTML = \`<a class=nb href=#_\${h.dataset.nb}>[\${++nbNum}]</a>\`;
            h.onclick = (e) => {
              e.preventDefault();
              hashLinkCheck(e.target.href);
            };
            const p = document.createElement("p");
            p.className = "nb";
            p.id = \`_\${h.dataset.nb}\`;
            const atag = document.createElement("a");
            atag.href = \`#\${h.id}\`;
            atag.textContent = \`\${nbNum}.\`;
            atag.onclick = (e) => { e.preventDefault(); h.scrollIntoView(); };
            const noteEl = document.getElementById(h.dataset.nb);
            p.appendChild(atag);
            p.append(" " + (noteEl ? noteEl.innerHTML : ""));
            inner.appendChild(p);
          });
          container.appendChild(inner);
        }
      }

      const observer = new MutationObserver(observed);
      observer.observe(document.body, { childList: true, subtree: true });
      observed();
      return container;
    }
    export { nbs };
    `;

    const blob = new Blob([newEditorialSrc], { type: "text/javascript" });
    display("New editorial.js content ready — " + blob.size + " bytes");
    display(newEditorialSrc);
  </script>
