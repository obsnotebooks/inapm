  <script id="4" type="text/markdown">
    The work that ushered me into writing with computation was first characterized by some sense of the significant and affective possibilities that may arise from exposing and exploiting certain relationships between words and their constituent elements. When language is transcribed or otherwise represented graphically, in English, we call these constituent elements ‘letters’ and we take them to be language’s fundamental constituent elements: its *atoms*. This is, of course, a simplification. But it is one that has traction for anyone *literate* and it has been disproportionately reinforced, if not hypostatized by the still predominant Western, now Global, regime of computation.

    Later, my work went on to experiment with translating from one spatial arrangement of letters to another. In the departure arrangement, the letters would be the constituents of one set of words; in the destination arrangement, letters from the same set or literal vocabulary would be moved or replaced to become the constituents of a different set of words. I characterized the processes that moved from one arrangement to another as ‘transliteral.’ The identities of the letters transcended the distinct arrangements and also any transitional arrangements in the shift from one readable state to another.
  </script>
  <script id="5" type="text/markdown">
    But I studied Chinese, and the graphic representation of languages in the sinosphere does not make use of graphic linguistic ‘atoms’ that neatly correspond with the Roman letters to which most of the literate world has become accustomed. When working on a major project, _riverIsland_, bringing together Chinese poetics with a personal poetic project that shared these poetics at the level of short lyric descriptions of place, I began to think about processes that would be able to translate from one system of literal transcription to another. From Roman letters to Chinese characters.

    Whereas my transliteral processes worked with on set of ‘atomic’ letters, Roman letters, the processes I came to call ‘interliteral’ had to translate from on set of letters to another, from one atomic ‘table of elements’ to another.

    In transliteral process the letters retain their integrity. They move or they are replaced. They retain the same kinds of relationships to words they constitute at any static point in the process. This is impossible with respect to what I am calling ‘interliteral’ processes. The only commonality, regarding either the letters themselves or the differently constituted ‘words’ that they represent is graphic. Thus an ‘interliteral’ translation is a graphic translation.

    For _riverIsland_ I made an animation – triggered at nodal points within the larger project – with interliteral translations. Here is the animation:

  <script id="10" type="text/markdown">
    The ordering of these keyframes and the repetition of the regular script character was intentional, and intentionally a compromise in that, in principle, a graphic morph from any of the keyframes to any other was possible. The sequence is conceived as a loop so that the morph from Cursive script (last keyframe) to Regular script (first keyframe) should be read into the figures above and it is, in fact, rendered into the animation.

    The no-font glyphs and Square Words keyframes require a little extra commentary.

    In the 1990s, I was already aware that what I now think of as the ‘regime of computation’ had been historically established and overdetermined by Anglo-American material cultural formations. With respect to the localization and internationalization of computer systems (though much good work was underway), non-alphabetic scripts were, at the time, basically being ‘patched into’ operating systems that had a modularity (a kind of textual atomic structure) built on Roman fonts sets and, initially, on ASCII. In a critical art gesture, I wanted to point to this structural and ideological bias by visualizing disjunctures of transcription to which non-alphabetic cultures were subjected, unless they adapted to, created, and installed ‘extra resources,’ such as fonts that needed to be handled by nonstandard protocols and special software. I do not think that I did a good enough job of explaining this at the time and it is likely that any potential effects of the gesture were mostly lost.

    The no-font glyphs show the two glyphs which used to display on Apple Mac computers when a text that had been produced on a system set up to edit Chinese traditional characters was moved to one on which the Chinese font was either not installed or not working. Specifically, of course, these glyphs are those substituted when attempting to display 空 *empty*, romanized *kong*. Moving forward, for any project that explores interliteral interpolation, I would not include this critical art keyframe.

    The Square Words keyframes are another matter. These are derived, with the artist’s permission, from a major multimodal art work by the aclaimed artist, Xu Bing (徐冰 1955- ). Although it has produced many outcomes and installations, his <cite>Square Word Calligraphy</cite> project is fundamentally a system for composing legible Roman letters into rectangular arrangments that resemble Chinese characters. To do this, Xu Bing initially designed a Roman alphabet drawn with Chinese calligraphic strokes and then applied rules for their composition into ‘Square Words’ that more or less conform to the rules for assembling the elements of traditional characters.&nbsp;<span data-nb="sqwords"></span>

    The actual Square Word images that I used in the animation were scanned from calligraphy that was done by Xu Bing himself. It made sense to place them where they are in the sequence since the morphs from Roman typeset ‘kong’ to the Square Word version is ‘close’ and then the morph from one Square Word character to another is ‘close’ along different dimensions, with a kind of return to the Roman typesetting of ‘empty’ providing a kind of mirrored or symmetrical interpolation. This is an example of how the ordering of the keyframes was approached: as a number of attempts to allow adjacency between keyframes that we are in some sense similar.

  <script id="23" type="text/markdown">
    ### The Potential for a much More Ambitious ‘Interliteral’ Project

    Even at the time I made this animation, I began to conceive of a more ambitious project. I understand this project from many different perspectives, all to do with inscription, reading, translation, but also very much concerned with *material* practices of writing and its associated and distinct *material cultures*, plural because material culture varies from language to language but especially, in this this specific project, across cultures having entirely different *systems of inscription*.&nbsp;<span data-nb="kittler"></span> There is the alphabetic cuture sphere on the one hand and the sinographic culture sphere on the other. One of the hypotheses underlying the project is the what it means *to write* in each of the culture spheres is fundamentally different; not that the significance or affect of *writing* is necessarily as as different but the act and what speech act theorist call the *felicity* of writing is very much and genertively distinct.
  </script>

    ---
    #### [ The Text from Programmatology: ]
    The atomic structure of written language and, I would argue, language-as-such differs in the two centers of ‘language and civilization.’ (I lean heavily and happily on Derrida in taking this view.) These differences are translated to digital media because linguistic structure itself — not simply linguistic ‘data’ — is transcribed by the entire historical process of digitization, taken to include the design of computing systems and data structures, not merely the actual transcription of cultural objects into bits and bytes. Basically, our programmatological systems reflect their derivation from an alphabetic system of linguistic inscription. Thus, I can easily use existing programming systems to manipulate western language in ways which correspond to encoded structures which are approximately ‘faithful’ to the language. It is easy to refer to letters as constituent of words, for instance. By contrast, it would be difficult, using existing systems in a straightforward way, to refer to the constituents of Chinese characters. Inevitably, in the first instance, while developing ideas and programs for text manipulation, I have taken advantage of the encoded structures of western language. I remain sharply aware that I am complicit with a privileged symbolic structure in doing so, recognizing that digitization could have been very different, commensurate with characters rather than letters. A recognition of this problematic underlies my most recent finished piece, <cite>riverIsland</cite>, which might otherwise be read as some sort of transcultural pastoral/lyric poetic exercise.
  </script>
